name: Enforce OPPi issue intake

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues that bypass OPPi intake
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map((label) => label.name));
            const body = issue.body || "";

            const hasIntakeLabels = labels.has("oppi-intake") && labels.has("from-oppi");
            const hasMarker = body.includes("oppi-intake:v1");
            if (hasIntakeLabels && hasMarker) {
              core.info(`Issue #${issue.number} was created through OPPi intake.`);
              return;
            }

            const message = [
              "Thanks for wanting to help OPPi.",
              "",
              "This repository accepts new bug reports and feature requests through the OPPi intake commands so the report includes the right context and sanitized diagnostics:",
              "",
              "```text",
              "/bug-report <what went wrong>",
              "/feature-request <what you want OPPi to do>",
              "```",
              "",
              "GitHub comments on existing issues are welcome. Directly opened issues are closed automatically to keep triage consistent.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "closed",
              state_reason: "not_planned",
            });
